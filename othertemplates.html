<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waun Galaxy Matchday Media Engine</title>
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --accent: #d97706;
            --text: #f8fafc;
            --border: #334155;
        }
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 1100px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-top: 20px;
        }
        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
        }
        .panel {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
        }
        .preview-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        canvas {
            max-width: 100%;
            height: auto;
            border-radius: 4px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            background-color: #000;
        }
        .form-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.875rem;
            font-weight: 500;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            background-color: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            box-sizing: border-box;
        }
        input:focus, select:focus {
            outline: none;
            border-color: var(--accent);
        }
        input[type="file"] {
            padding: 6px;
            cursor: pointer;
        }
        .row-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        h1 { margin: 0 0 10px 0; font-size: 1.75rem; text-align: center; }
        h2 { margin: 0 0 16px 0; font-size: 1.25rem; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            background-color: var(--accent);
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <h1>🌌 Waun Galaxy Media Engine</h1>
    <div class="badge">Live Repository Data Pipeline</div>

    <div class="container">
        <!-- Control Panel -->
        <div class="panel">
            <h2>Graphic Configuration</h2>
            
            <div class="form-group">
                <label for="fixture-selector">Select Active Fixture Row</label>
                <select id="fixture-selector" onchange="onFixtureRowChange()">
                    <option value="">-- Fetching sorted schedules from fixtures.csv --</option>
                </select>
            </div>

            <div class="row-grid">
                <div class="form-group">
                    <label for="manual-opponent-logo-select">Opposition Logo Override</label>
                    <select id="manual-opponent-logo-select" onchange="onManualImageChange()">
                        <option value="AUTO">⚙️ Auto-Match via CSV Row</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="bg-file-uploader">Browse Background Poster Image</label>
                    <input type="file" id="bg-file-uploader" accept="image/*" onchange="onBackgroundFileUploaded()">
                </div>
            </div>

            <hr style="border: 0; border-top: 1px solid var(--border); margin: 20px 0;">

            <div class="row-grid">
                <div class="form-group">
                    <label for="comp-input">Competition</label>
                    <input type="text" id="comp-input" oninput="updateCanvasPreview()" value="">
                </div>
                <div class="form-group">
                    <label for="squad-input">Our Team Unit</label>
                    <input type="text" id="squad-input" oninput="updateCanvasPreview()" value="First Team">
                </div>
            </div>

            <div class="row-grid">
                <div class="form-group">
                    <label for="team-input">Opponent Team</label>
                    <input type="text" id="team-input" oninput="onManualTeamTextInput()" value="">
                </div>
                <div class="form-group">
                    <label for="date-input">Match Date (Formatted Output)</label>
                    <input type="text" id="date-input" oninput="updateCanvasPreview()" value="">
                </div>
            </div>

            <div class="form-group">
                <label for="venue-input">Venue Location / Kick-Off Time</label>
                <input type="text" id="venue-input" oninput="updateCanvasPreview()" value="">
            </div>

            <div class="row-grid">
                <div class="form-group">
                    <label for="bg-color">Graphic Accent Tint</label>
                    <input type="color" id="bg-color" value="#1e3a8a">
                </div>
                <div class="form-group">
                    <label for="text-color">Overlay Text Tint</label>
                    <input type="color" id="text-color" value="#ffffff">
                </div>
            </div>
        </div>

        <!-- Canvas Preview Panel -->
        <div class="panel preview-panel">
            <h2>Live Engine Preview</h2>
            <canvas id="clubMediaCanvas" width="800" height="800"></canvas>
            <p style="font-size: 0.75rem; color: #94a3b8; margin-top: 12px; text-align: center;">
                Right-click the graphic frame preview window to save or export the generated image asset.
            </p>
        </div>
    </div>

    <script>
        let fixturesData = [];
        const canvas = document.getElementById('clubMediaCanvas');
        const ctx = canvas.getContext('2d');

        // Setup image vectors with crossOrigin flags enabled
        let clubLogoImg = new Image();
        let opponentLogoImg = new Image();
        let posterBackgroundImg = new Image();
        
        clubLogoImg.crossOrigin = "anonymous";
        opponentLogoImg.crossOrigin = "anonymous";
        posterBackgroundImg.crossOrigin = "anonymous";
        
        clubLogoImg.src = 'WaunG.png';
        
        clubLogoImg.onload = () => updateCanvasPreview();
        posterBackgroundImg.onload = () => updateCanvasPreview();
        opponentLogoImg.onload = () => updateCanvasPreview();
        opponentLogoImg.onerror = () => {
            console.warn("Target opponent graphics asset missing at remote directory.");
            updateCanvasPreview();
        };

        window.addEventListener('load', () => {
            loadFixturesCSVFile();
            scanGitHubMainBranchImages();
            setupColorChangeListeners();
        });

        // Generates the proper ordinal indicator for any given calendar date number
        function getOrdinalSuffix(day) {
            if (day > 3 && day < 21) return 'th';
            switch (day % 10) {
                case 1:  return "st";
                case 2:  return "nd";
                case 3:  return "rd";
                default: return "th";
            }
        }

        // Transforms YYYY-MM-DD string data arrays into "Monday 13th July 2026" long format
        function formatLongDateString(rawDateStr) {
            if (!rawDateStr || !rawDateStr.includes('-')) return rawDateStr;
            
            const parts = rawDateStr.trim().split('-');
            if (parts.length !== 3) return rawDateStr;

            const year = parseInt(parts[0], 10);
            const month = parseInt(parts[1], 10) - 1;
            const day = parseInt(parts[2], 10);

            const dateObj = new Date(year, month, day);
            
            // Validate constructed date calculation footprint
            if (isNaN(dateObj.getTime())) return rawDateStr;

            const daysOfWeek = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
            const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];

            const dayName = daysOfWeek[dateObj.getDay()];
            const monthName = months[dateObj.getMonth()];
            const ordinal = getOrdinalSuffix(day);

            return `${dayName} ${day}${ordinal} ${monthName} ${year}`;
        }

        function getRepoMetadata() {
            const hostname = window.location.hostname;
            const pathname = window.location.pathname;
            
            let owner = "joelbharrison-ux"; 
            let repo = "Waun-Galaxy-Tools";

            const pathParts = pathname.split('/').filter(p => p.trim().length > 0);

            if (hostname.includes("github.io")) {
                owner = hostname.split('.')[0];
                if (pathParts.length > 0) {
                    repo = pathParts[0];
                }
            } 
            else if (hostname.includes("github.com")) {
                if (pathParts.length >= 2) {
                    owner = pathParts[0];
                    repo = pathParts[1];
                }
            }
            return { owner, repo };
        }

        function scanGitHubMainBranchImages() {
            const dropdown = document.getElementById('manual-opponent-logo-select');
            const meta = getRepoMetadata();
            
            const apiUrl = `https://api.github.com/repos/${meta.owner}/${meta.repo}/contents/Images/Club%20Images?ref=main`;

            fetch(apiUrl)
                .then(res => res.json())
                .then(data => {
                    if(!Array.isArray(data)) return;
                    const imageFiles = data.filter(item => /\.(png|jpg|jpeg|webp|svg)$/i.test(item.name));
                    dropdown.innerHTML = '<option value="AUTO">⚙️ Auto-Match via CSV Row</option>';
                    imageFiles.forEach(file => {
                        let opt = document.createElement('option');
                        opt.value = file.name;
                        opt.textContent = file.name;
                        dropdown.appendChild(opt);
                    });
                    resolveOpponentImagePipeline();
                })
                .catch(err => console.error("Logo list mapping error: ", err.message));
        }

        function loadFixturesCSVFile() {
            const selector = document.getElementById('fixture-selector');
            fetch('fixtures.csv')
                .then(res => {
                    if(!res.ok) throw new Error("Target file 'fixtures.csv' not found at repository root.");
                    return res.text();
                })
                .then(text => parseFixturesCSV(text))
                .catch(err => {
                    console.error(err.message);
                    selector.innerHTML = `<option value="">❌ Error: 'fixtures.csv' missing at repository root.</option>`;
                });
        }

        function parseFixturesCSV(text) {
            const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            if (lines.length === 0) return;

            const headers = lines[0].split(',').map(h => h.trim().toLowerCase());
            const idxOpponent = headers.findIndex(h => h.includes('opp'));
            const idxDate = headers.findIndex(h => h.includes('dat'));
            const idxVenue = headers.findIndex(h => h.includes('ven'));
            const idxComp = headers.findIndex(h => h.includes('comp'));

            const oIdx = idxOpponent !== -1 ? idxOpponent : 0;
            const dIdx = idxDate !== -1 ? idxDate : 1;
            const vIdx = idxVenue !== -1 ? idxVenue : 2;
            const cIdx = idxComp !== -1 ? idxComp : 3;

            fixturesData = [];

            for(let i = 1; i < lines.length; i++) {
                const columns = lines[i].split(',');
                if(columns.length > Math.max(oIdx, dIdx, vIdx, cIdx)) {
                    fixturesData.push({
                        opponent: columns[oIdx].trim(),
                        date: columns[dIdx].trim(), // Expecting YYYY-MM-DD directly from dataset
                        venue: columns[vIdx].trim(),
                        competition: columns[cIdx].trim()
                    });
                }
            }

            // Absolute timeline sort execution sorting low date signatures up first
            fixturesData.sort((a, b) => new Date(a.date) - new Date(b.date));

            const dropdown = document.getElementById('fixture-selector');
            dropdown.innerHTML = '<option value="">-- Choose an Event Match Row --</option>';

            fixturesData.forEach((match, index) => {
                let opt = document.createElement('option');
                opt.value = index;
                // Formats the selection row text dynamically using the new date syntax engine
                const displayDate = formatLongDateString(match.date);
                opt.textContent = `(${displayDate}) vs ${match.opponent} [${match.competition}]`;
                dropdown.appendChild(opt);
            });
        }

        function onFixtureRowChange() {
            const index = document.getElementById('fixture-selector').value;
            if (index === "") return;

            const selectedMatch = fixturesData[index];
            if (!selectedMatch) return;
            
            document.getElementById('team-input').value = selectedMatch.opponent;
            document.getElementById('venue-input').value = selectedMatch.venue;
            document.getElementById('comp-input').value = selectedMatch.competition;
            
            // Apply long writing format logic to data inputs field rendering
            document.getElementById('date-input').value = formatLongDateString(selectedMatch.date);

            resolveOpponentImagePipeline();
        }

        // Processes files selected via the local file browser uploader element
        function onBackgroundFileUploaded() {
            const fileInput = document.getElementById('bg-file-uploader');
            if (fileInput.files && fileInput.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    posterBackgroundImg.src = e.target.result;
                    console.log("Local background image loaded successfully.");
                };
                reader.readAsDataURL(fileInput.files[0]);
            }
        }

        function resolveOpponentImagePipeline() {
            const manualImageDropdown = document.getElementById('manual-opponent-logo-select');
            const currentTeamName = document.getElementById('team-input').value;
            const meta = getRepoMetadata();
            
            let targetFileName = "";

            if (manualImageDropdown.value === "AUTO") {
                targetFileName = currentTeamName ? `${currentTeamName}.png` : "";
            } else {
                targetFileName = manualImageDropdown.value;
            }

            if (targetFileName) {
                const safeUrlPath = encodeURI(targetFileName);
                const targetSrc = `https://raw.githubusercontent.com/${meta.owner}/${meta.repo}/main/Images/Club%20Images/${safeUrlPath}`;
                
                if (opponentLogoImg.src !== targetSrc) {
                    opponentLogoImg.removeAttribute('src');
                    opponentLogoImg.src = targetSrc;
                }
            } else {
                opponentLogoImg.removeAttribute('src');
            }
            updateCanvasPreview();
        }

        function onManualImageChange() { resolveOpponentImagePipeline(); }
        function onManualTeamTextInput() { resolveOpponentImagePipeline(); }
        
        function setupColorChangeListeners() {
            document.getElementById('bg-color').addEventListener('input', updateCanvasPreview);
            document.getElementById('text-color').addEventListener('input', updateCanvasPreview);
        }

        function updateCanvasPreview() {
            const comp = document.getElementById('comp-input').value;
            const squad = document.getElementById('squad-input').value;
            const date = document.getElementById('date-input').value;
            const team = document.getElementById('team-input').value;
            const venue = document.getElementById('venue-input').value;
            const accentColor = document.getElementById('bg-color').value;
            const fontColor = document.getElementById('text-color').value;

            // Layer 1: Draw Custom Poster Background Frame base canvas view
            if (posterBackgroundImg.src && posterBackgroundImg.complete && posterBackgroundImg.naturalWidth !== 0) {
                ctx.drawImage(posterBackgroundImg, 0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "rgba(11, 15, 25, 0.75)"; // semi-transparent protection overlay
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            } else {
                ctx.fillStyle = "#0b0f19";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            // Layer 2: Geometric Color Mask Layout Overlay Split
            ctx.fillStyle = accentColor;
            ctx.globalAlpha = 0.85;
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(canvas.width * 0.45, 0);
            ctx.lineTo(canvas.width * 0.30, canvas.height);
            ctx.lineTo(0, canvas.height);
            ctx.fill();
            ctx.globalAlpha = 1.0;

            // Center Separation Text Hub
            ctx.fillStyle = "#ffffff";
            ctx.font = "italic bold 46px sans-serif";
            ctx.textAlign = "center";
            ctx.fillText("VS", canvas.width * 0.5, canvas.height * 0.38);

            // Draw Home Galaxy Crest Shield Badge
            try {
                ctx.drawImage(clubLogoImg, canvas.width * 0.15 - 75, canvas.height * 0.28 - 75, 150, 150);
            } catch(e) {
                ctx.fillStyle = "#ffffff";
                ctx.font = "16px sans-serif";
                ctx.fillText("Waun Galaxy", canvas.width * 0.15, canvas.height * 0.28);
            }

            // Draw Opponent Crest Shield Badge
            const hasValidSrc = opponentLogoImg.getAttribute('src') !== null && opponentLogoImg.src !== "";
            if (hasValidSrc && opponentLogoImg.complete && opponentLogoImg.naturalWidth !== 0) {
                ctx.drawImage(opponentLogoImg, canvas.width * 0.85 - 75, canvas.height * 0.28 - 75, 150, 150);
            } else {
                ctx.fillStyle = "#e2e8f0";
                ctx.beginPath();
                ctx.arc(canvas.width * 0.85, canvas.height * 0.28, 60, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = "#475569";
                ctx.font = "bold 14px sans-serif";
                
                let labelText = "NO ASSET";
                if (hasValidSrc && !opponentLogoImg.complete) labelText = "LOADING...";
                else if (hasValidSrc && opponentLogoImg.naturalWidth === 0) labelText = "NOT FOUND";
                
                ctx.fillText(labelText, canvas.width * 0.85, canvas.height * 0.29);
            }

            // Typography Engine Rendering Output
            ctx.fillStyle = fontColor;
            ctx.textAlign = "center";

            // Competition Title Display Block
            ctx.font = "bold 28px sans-serif";
            ctx.fillText(comp.toUpperCase() || "MATCHDAY PREVIEW", canvas.width * 0.5, canvas.height * 0.58);

            // Team Squad Segment Designation Type Block (e.g. First Team)
            ctx.font = "600 24px sans-serif";
            ctx.fillStyle = "#94a3b8";
            ctx.fillText(squad.toUpperCase(), canvas.width * 0.5, canvas.height * 0.63);

            // Main Core Focused Target Opponent Name Typography Block
            ctx.font = "italic 800 54px sans-serif";
            ctx.fillStyle = fontColor;
            ctx.fillText(team || "OPPONENT CLUB", canvas.width * 0.5, canvas.height * 0.72);

            // Formatted Chronological Date Text Output Block
            ctx.font = "bold 26px sans-serif";
            ctx.fillStyle = "#f59e0b";
            ctx.fillText(date || "DATE PENDING", canvas.width * 0.5, canvas.height * 0.80);
            
            // Venue / Time Specification Information Text Block
            ctx.font = "500 24px sans-serif";
            ctx.fillStyle = "#94a3b8";
            ctx.fillText(venue || "VENUE / TIME TBD", canvas.width * 0.5, canvas.height * 0.86);
        }
    </script>
</body>
</html>
