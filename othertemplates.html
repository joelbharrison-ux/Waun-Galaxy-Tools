<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waun Galaxy Matchday Media Engine</title>
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --accent: #d97706;
            --text: #f8fafc;
            --border: #334155;
        }
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 1100px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-top: 20px;
        }
        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
        }
        .panel {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
        }
        .preview-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        canvas {
            max-width: 100%;
            height: auto;
            border-radius: 4px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            background-color: #000;
        }
        .form-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.875rem;
            font-weight: 500;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            background-color: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            box-sizing: border-box;
        }
        input:focus, select:focus {
            outline: none;
            border-color: var(--accent);
        }
        .row-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        h1 { margin: 0 0 10px 0; font-size: 1.75rem; text-align: center; }
        h2 { margin: 0 0 16px 0; font-size: 1.25rem; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            background-color: var(--accent);
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <h1>🌌 Waun Galaxy Media Engine</h1>
    <div class="badge">Production Environment Pipeline</div>

    <div class="container">
        <!-- Control Panel -->
        <div class="panel">
            <h2>Graphic Configuration</h2>
            
            <div class="form-group">
                <label for="fixture-selector">Select Active Fixture Row</label>
                <select id="fixture-selector" onchange="onFixtureRowChange()">
                    <option value="">-- Loading dynamic schedule CSV data --</option>
                </select>
            </div>

            <div class="form-group">
                <label for="manual-opponent-logo-select">Asset Registry Look-up (Images/Club Images)</label>
                <select id="manual-opponent-logo-select" onchange="updateCanvasPreview()">
                    <option value="AUTO">⚙️ Auto-Match via CSV Row</option>
                </select>
            </div>

            <hr style="border: 0; border-top: 1px solid var(--border); margin: 20px 0;">

            <div class="row-grid">
                <div class="form-group">
                    <label for="comp-input">Competition</label>
                    <input type="text" id="comp-input" oninput="updateCanvasPreview()" value="League Match">
                </div>
                <div class="form-group">
                    <label for="date-input">Date & Time</label>
                    <input type="text" id="date-input" oninput="updateCanvasPreview()" value="Saturday 2:30 PM">
                </div>
            </div>

            <div class="row-grid">
                <div class="form-group">
                    <label for="team-input">Opponent Team</label>
                    <input type="text" id="team-input" oninput="updateCanvasPreview()" value="Opponent FC">
                </div>
                <div class="form-group">
                    <label for="venue-input">Venue Location</label>
                    <input type="text" id="venue-input" oninput="updateCanvasPreview()" value="Away Ground">
                </div>
            </div>

            <div class="row-grid">
                <div class="form-group">
                    <label for="bg-color">Graphic Accent Tint</label>
                    <input type="color" id="bg-color" value="#1e3a8a">
                </div>
                <div class="form-group">
                    <label for="text-color">Overlay Text Tint</label>
                    <input type="color" id="text-color" value="#ffffff">
                </div>
            </div>
        </div>

        <!-- Canvas Preview Panel -->
        <div class="panel preview-panel">
            <h2>Live Engine Preview</h2>
            <canvas id="clubMediaCanvas" width="800" height="800"></canvas>
            <p style="font-size: 0.75rem; color: #94a3b8; margin-top: 12px; text-align: center;">
                Right-click the graphic frame preview window to save or export the generated image asset.
            </p>
        </div>
    </div>

    <script>
        let mockFixturesCSV = [];
        let systemMode = 'csv'; 
        const canvas = document.getElementById('clubMediaCanvas');
        const ctx = canvas.getContext('2d');

        let clubLogoImg = new Image();
        let opponentLogoImg = new Image();
        
        // Root base home assets setup
        clubLogoImg.src = 'WaunG.png';
        
        clubLogoImg.onload = () => updateCanvasPreview();
        opponentLogoImg.onload = () => updateCanvasPreview();
        opponentLogoImg.onerror = () => {
            console.warn("Opponent image could not be resolved from relative repository path.");
            updateCanvasPreview();
        };

        window.addEventListener('load', () => {
            loadFixturesCSVFile();
            scanGitHubMainBranchImages();
            setupColorChangeListeners();
        });

        // Precision URL Sniffer for github.com/joelbharrison-ux/Waun-Galaxy-Tools
        function getRepoMetadata() {
            const hostname = window.location.hostname;
            const pathname = window.location.pathname;
            
            // Standard target parameters matched exactly to your live repository profile
            let owner = "joelbharrison-ux"; 
            let repo = "Waun-Galaxy-Tools";

            const pathParts = pathname.split('/').filter(p => p.trim().length > 0);

            // Case 1: Running live via GitHub Pages (e.g., joelbharrison-ux.github.io/Waun-Galaxy-Tools/)
            if (hostname.includes("github.io")) {
                owner = hostname.split('.')[0];
                if (pathParts.length > 0) {
                    repo = pathParts[0];
                }
            } 
            // Case 2: Opened directly inside the github.com file interface layers
            else if (hostname.includes("github.com")) {
                if (pathParts.length >= 2) {
                    owner = pathParts[0];
                    repo = pathParts[1];
                }
            }
            
            return { owner, repo };
        }

        function scanGitHubMainBranchImages() {
            const dropdown = document.getElementById('manual-opponent-logo-select');
            const meta = getRepoMetadata();
            
            // Diagnostics printing directly out to F12 Console Window
            console.log("%c⚓ DATA INGESTION ENGINE ACTIVE", "color: #d97706; font-weight: bold;");
            console.table(meta);
            
            const apiUrl = `https://api.github.com/repos/${meta.owner}/${meta.repo}/contents/Images/Club%20Images?ref=main`;

            fetch(apiUrl)
                .then(res => {
                    if(!res.ok) throw new Error(`GitHub API Rejected Request (Status: ${res.status}). Verify character casing parameters.`);
                    return res.json();
                })
                .then(data => {
                    const imageFiles = data.filter(item => /\.(png|jpg|jpeg|webp|svg)$/i.test(item.name));
                    
                    dropdown.innerHTML = '<option value="AUTO">⚙️ Auto-Match via CSV Row</option>';
                    
                    imageFiles.forEach(file => {
                        let opt = document.createElement('option');
                        opt.value = file.name;
                        opt.textContent = file.name;
                        dropdown.appendChild(opt);
                    });
                    
                    onFixtureRowChange();
                })
                .catch(err => {
                    console.error("Dynamic Image Scrape Failed: ", err.message);
                    dropdown.innerHTML = `
                        <option value="AUTO">⚙️ Auto-Match via CSV Row</option>
                        <option value="" disabled>❌ Auto-detect failed (${meta.owner}/${meta.repo})</option>
                    `;
                });
        }

        function loadFixturesCSVFile() {
            // Attempt extraction of native fixtures file relative repository root pathing structures
            fetch('fixtures.csv')
                .then(res => {
                    if(!res.ok) throw new Error("Local CSV file not found, applying procedural generation structural fallbacks.");
                    return res.text();
                })
                .then(text => {
                    parseFixturesCSV(text);
                })
                .catch(err => {
                    console.log(err.message);
                    generateMockFallbackCSV();
                });
        }

        function parseFixturesCSV(text) {
            const lines = text.split('\n');
            mockFixturesCSV = [];
            
            const dropdown = document.getElementById('fixture-selector');
            dropdown.innerHTML = '';

            for(let i = 1; i < lines.length; i++) {
                if(!lines[i].trim()) continue;
                const columns = lines[i].split(',');
                if(columns.length >= 4) {
                    const matchObj = {
                        opponent: columns[0].trim(),
                        date: columns[1].trim(),
                        venue: columns[2].trim(),
                        competition: columns[3].trim()
                    };
                    mockFixturesCSV.push(matchObj);
                    
                    let opt = document.createElement('option');
                    opt.value = mockFixturesCSV.length - 1;
                    opt.textContent = `${matchObj.competition}: vs ${matchObj.opponent} (${matchObj.date})`;
                    dropdown.appendChild(opt);
                }
            }
            onFixtureRowChange();
        }

        function generateMockFallbackCSV() {
            mockFixturesCSV = [
                { opponent: "Swansea City Academy", date: "Saturday Oct 14 - 14:30", venue: "Gorseinon Ground (Away)", competition: "West Wales Premier League" },
                { opponent: "Mumbles Rangers", date: "Friday Oct 20 - 19:30", venue: "Underhill Park (Home)", competition: "FAW Welsh Cup" },
                { opponent: "Pontarddulais Town", date: "Saturday Nov 04 - 14:00", venue: "Coed Bach Park (Away)", competition: "West Wales Premier League" }
            ];
            
            const dropdown = document.getElementById('fixture-selector');
            dropdown.innerHTML = '';
            
            mockFixturesCSV.forEach((match, index) => {
                let opt = document.createElement('option');
                opt.value = index;
                opt.textContent = `[Fallback] ${match.competition} vs ${match.opponent}`;
                dropdown.appendChild(opt);
            });
            onFixtureRowChange();
        }

        function onFixtureRowChange() {
            const index = document.getElementById('fixture-selector').value;
            if (index === "" || !mockFixturesCSV[index]) return;

            const selectedMatch = mockFixturesCSV[index];
            
            document.getElementById('team-input').value = selectedMatch.opponent;
            document.getElementById('date-input').value = selectedMatch.date;
            document.getElementById('venue-input').value = selectedMatch.venue;
            document.getElementById('comp-input').value = selectedMatch.competition;

            const manualImageDropdown = document.getElementById('manual-opponent-logo-select');
            const meta = getRepoMetadata();

            if (manualImageDropdown.value === "AUTO") {
                // Sanitize opponent string matching profile structure rules securely
                const sanitizedOpponentName = encodeURIComponent(selectedMatch.opponent);
                opponentLogoImg.src = `https://raw.githubusercontent.com/${meta.owner}/${meta.repo}/main/Images/Club%20Images/${sanitizedOpponentName}.png`;
            } else if (manualImageDropdown.value !== "") {
                opponentLogoImg.src = `https://raw.githubusercontent.com/${meta.owner}/${meta.repo}/main/Images/Club%20Images/${manualImageDropdown.value}`;
            }

            updateCanvasPreview();
        }

        function setupColorChangeListeners() {
            document.getElementById('bg-color').addEventListener('input', updateCanvasPreview);
            document.getElementById('text-color').addEventListener('input', updateCanvasPreview);
        }

        function updateCanvasPreview() {
            const comp = document.getElementById('comp-input').value;
            const date = document.getElementById('date-input').value;
            const team = document.getElementById('team-input').value;
            const venue = document.getElementById('venue-input').value;
            const accentColor = document.getElementById('bg-color').value;
            const fontColor = document.getElementById('text-color').value;

            // Canvas Background Base Layers Setup
            ctx.fillStyle = "#0b0f19";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Geometry Graphic Accent Intersections
            ctx.fillStyle = accentColor;
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(canvas.width * 0.45, 0);
            ctx.lineTo(canvas.width * 0.30, canvas.height);
            ctx.lineTo(0, canvas.height);
            ctx.fill();

            // Render Center "VS" Element separator block
            ctx.fillStyle = "#ffffff";
            ctx.font = "italic bold 48px sans-serif";
            ctx.textAlign = "center";
            ctx.fillText("VS", canvas.width * 0.5, canvas.height * 0.42);

            // Base Image Composition Layout Blocks
            try {
                ctx.drawImage(clubLogoImg, canvas.width * 0.12 - 75, canvas.height * 0.30 - 75, 150, 150);
            } catch(e) {
                ctx.fillStyle = "#ffffff";
                ctx.font = "16px sans-serif";
                ctx.fillText("Waun Galaxy Logo", canvas.width * 0.12, canvas.height * 0.30);
            }

            if(opponentLogoImg.complete && opponentLogoImg.naturalWidth !== 0) {
                ctx.drawImage(opponentLogoImg, canvas.width * 0.88 - 75, canvas.height * 0.30 - 75, 150, 150);
            } else {
                ctx.fillStyle = "#e2e8f0";
                ctx.beginPath();
                ctx.arc(canvas.width * 0.88, canvas.height * 0.30, 60, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = "#475569";
                ctx.font = "bold 14px sans-serif";
                ctx.fillText("NO IMAGE", canvas.width * 0.88, canvas.height * 0.31);
            }

            // Text Typography Compositor Engine Output
            ctx.fillStyle = fontColor;
            ctx.textAlign = "center";

            ctx.font = "bold 28px sans-serif";
            ctx.fillText(comp.toUpperCase(), canvas.width * 0.5, canvas.height * 0.65);

            ctx.font = "italic 800 52px sans-serif";
            ctx.fillText(team, canvas.width * 0.5, canvas.height * 0.74);

            ctx.font = "500 24px sans-serif";
            ctx.fillStyle = "#94a3b8";
            ctx.fillText(date, canvas.width * 0.5, canvas.height * 0.82);
            ctx.fillText(venue, canvas.width * 0.5, canvas.height * 0.87);
        }
    </script>
</body>
</html>
