<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waun Galaxy Matchday Media Engine</title>
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --accent: #0d8c22;
            --text: #f8fafc;
            --border: #334155;
        }
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 1200px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-top: 20px;
        }
        @media (max-width: 900px) {
            .container { grid-template-columns: 1fr; }
        }
        .panel {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 24px;
        }
        .preview-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        canvas {
            max-width: 100%;
            height: auto;
            border-radius: 6px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.4);
            background-color: #000;
        }
        .form-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.875rem;
            font-weight: 500;
            color: #94a3b8;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            background-color: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            box-sizing: border-box;
            font-size: 0.95rem;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #0d8c22;
        }
        input[type="file"] {
            padding: 6px;
            cursor: pointer;
        }
        .row-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        h1 { margin: 0 0 4px 0; font-size: 1.85rem; text-align: center; font-weight: 800; letter-spacing: -0.025em; }
        h2 { margin: 0 0 16px 0; font-size: 1.25rem; border-bottom: 1px solid var(--border); padding-bottom: 8px; font-weight: 600; }
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            background-color: #0d8c22;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        hr { border: 0; border-top: 1px solid var(--border); margin: 20px 0; }
    </style>
</head>
<body>

    <h1>🌌 Waun Galaxy Pro Media Engine</h1>
    <div class="badge">Matchday Design Studio</div>

    <div class="container">
        <!-- Control Panel -->
        <div class="panel">
            <h2>Graphic Configuration</h2>
            
            <div class="form-group">
                <label for="fixture-selector">Select Active Fixture Row</label>
                <select id="fixture-selector" onchange="onFixtureRowChange()">
                    <option value="">-- Loading schedules --</option>
                </select>
            </div>

            <div class="row-grid">
                <div class="form-group">
                    <label for="manual-opponent-logo-select">Opposition Crest Source</label>
                    <select id="manual-opponent-logo-select" onchange="onManualImageChange()">
                        <option value="AUTO">⚙️ Auto-Match via Team Name</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="bg-file-uploader">Background Template Canvas</label>
                    <input type="file" id="bg-file-uploader" accept="image/*" onchange="onBackgroundFileUploaded()">
                </div>
            </div>

            <hr>

            <div class="row-grid">
                <div class="form-group">
                    <label for="comp-input">Competition / League</label>
                    <input type="text" id="comp-input" oninput="updateCanvasPreview()">
                </div>
                <div class="form-group">
                    <label for="squad-input">Squad Unit Classification</label>
                    <input type="text" id="squad-input" oninput="updateCanvasPreview()">
                </div>
            </div>

            <div class="row-grid">
                <div class="form-group">
                    <label for="team-input">Opponent Team Name</label>
                    <input type="text" id="team-input" oninput="onManualTeamTextInput()">
                </div>
                <div class="form-group">
                    <label for="date-input">Match Date (Formatted Output)</label>
                    <input type="text" id="date-input" oninput="updateCanvasPreview()">
                </div>
            </div>

            <div class="row-grid">
                <div class="form-group">
                    <label for="time-input">Kick-Off Time</label>
                    <input type="text" id="time-input" oninput="updateCanvasPreview()" placeholder="e.g. 14:30">
                </div>
                <div class="form-group">
                    <label for="venue-input">Venue Location</label>
                    <input type="text" id="venue-input" oninput="updateCanvasPreview()">
                </div>
            </div>

            <div class="row-grid">
                <div class="form-group">
                    <label for="bg-color">Graphic Accent Branding Theme</label>
                    <input type="color" id="bg-color" value="#0d8c22">
                </div>
                <div class="form-group">
                    <label for="text-color">Typography Color Tint</label>
                    <input type="color" id="text-color" value="#ffffff">
                </div>
            </div>
        </div>

        <!-- Canvas Preview Panel -->
        <div class="panel preview-panel">
            <h2>Live Production Canvas</h2>
            <canvas id="clubMediaCanvas" width="1000" height="1000"></canvas>
            <p style="font-size: 0.8rem; color: #64748b; margin-top: 14px; text-align: center; font-weight: 500;">
                Right-click the production window above to save or export your matchday graphic asset.
            </p>
        </div>
    </div>

    <script>
        let fixturesData = [];
        const canvas = document.getElementById('clubMediaCanvas');
        const ctx = canvas.getContext('2d');

        let clubLogoImg = new Image();
        let opponentLogoImg = new Image();
        let posterBackgroundImg = new Image();
        
        clubLogoImg.crossOrigin = "anonymous";
        opponentLogoImg.crossOrigin = "anonymous";
        posterBackgroundImg.crossOrigin = "anonymous";
        
        clubLogoImg.src = 'WaunG.png';
        
        clubLogoImg.onload = () => updateCanvasPreview();
        posterBackgroundImg.onload = () => updateCanvasPreview();
        opponentLogoImg.onload = () => updateCanvasPreview();
        opponentLogoImg.onerror = () => { updateCanvasPreview(); };

        window.addEventListener('load', () => {
            loadFixturesCSVFile();
            scanGitHubMainBranchImages();
            setupColorChangeListeners();
        });

        function getOrdinalSuffix(day) {
            if (day > 3 && day < 21) return 'th';
            switch (day % 10) {
                case 1:  return "st";
                case 2:  return "nd";
                case 3:  return "rd";
                default: return "th";
            }
        }

        function formatLongDateString(rawDateStr) {
            if (!rawDateStr || !rawDateStr.includes('-')) return rawDateStr;
            const parts = rawDateStr.trim().split('-');
            if (parts.length !== 3) return rawDateStr;

            const year = parseInt(parts[0], 10);
            const month = parseInt(parts[1], 10) - 1;
            const day = parseInt(parts[2], 10);
            const dateObj = new Date(year, month, day);
            
            if (isNaN(dateObj.getTime())) return rawDateStr;

            const daysOfWeek = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
            const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];

            return `${daysOfWeek[dateObj.getDay()]} ${day}${getOrdinalSuffix(day)} ${months[dateObj.getMonth()]} ${year}`;
        }

        function getRepoMetadata() {
            const hostname = window.location.hostname;
            const pathname = window.location.pathname;
            let owner = "joelbharrison-ux"; 
            let repo = "Waun-Galaxy-Tools";
            const pathParts = pathname.split('/').filter(p => p.trim().length > 0);

            if (hostname.includes("github.io")) {
                owner = hostname.split('.')[0];
                if (pathParts.length > 0) repo = pathParts[0];
            } else if (hostname.includes("github.com") && pathParts.length >= 2) {
                owner = pathParts[0];
                repo = pathParts[1];
            }
            return { owner, repo };
        }

        function scanGitHubMainBranchImages() {
            const dropdown = document.getElementById('manual-opponent-logo-select');
            const meta = getRepoMetadata();
            const apiUrl = `https://api.github.com/repos/${meta.owner}/${meta.repo}/contents/Images/Club%20Images?ref=main`;

            fetch(apiUrl)
                .then(res => res.json())
                .then(data => {
                    if(!Array.isArray(data)) return;
                    const imageFiles = data.filter(item => /\.(png|jpg|jpeg|webp|svg)$/i.test(item.name));
                    dropdown.innerHTML = '<option value="AUTO">⚙️ Auto-Match via Team Name</option>';
                    imageFiles.forEach(file => {
                        let opt = document.createElement('option');
                        opt.value = file.name;
                        opt.textContent = file.name;
                        dropdown.appendChild(opt);
                    });
                    resolveOpponentImagePipeline();
                })
                .catch(err => console.error("Logo list parsing exception: ", err.message));
        }

        function loadFixturesCSVFile() {
            const selector = document.getElementById('fixture-selector');
            fetch('fixtures.csv')
                .then(res => {
                    if(!res.ok) throw new Error("Target file 'fixtures.csv' not accessible.");
                    return res.text();
                })
                .then(text => parseFixturesCSV(text))
                .catch(err => {
                    selector.innerHTML = `<option value="">❌ Error Loading fixtures.csv</option>`;
                });
        }

        function parseFixturesCSV(text) {
            const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            if (lines.length === 0) return;

            const headers = lines[0].split(',').map(h => h.trim().toLowerCase());
            
            const idxOpponent = headers.findIndex(h => h.includes('opp'));
            const idxDate = headers.findIndex(h => h.includes('dat'));
            const idxVenue = headers.findIndex(h => h.includes('ven'));
            const idxComp = headers.findIndex(h => h.includes('comp'));
            const idxTeam = headers.findIndex(h => h === 'team' || h === 'squad' || h.includes('unit'));
            const idxTime = headers.findIndex(h => h.includes('time') || h.includes('kick'));

            fixturesData = [];

            for(let i = 1; i < lines.length; i++) {
                const columns = lines[i].split(',');
                if(columns.length > 0) {
                    let rowOpponent = idxOpponent !== -1 && columns[idxOpponent] ? columns[idxOpponent].trim() : (columns[0] ? columns[0].trim() : "");
                    let rowDate = idxDate !== -1 && columns[idxDate] ? columns[idxDate].trim() : (columns[1] ? columns[1].trim() : "");
                    let rowVenue = idxVenue !== -1 && columns[idxVenue] ? columns[idxVenue].trim() : (columns[2] ? columns[2].trim() : "");
                    let rowComp = idxComp !== -1 && columns[idxComp] ? columns[idxComp].trim() : (columns[3] ? columns[3].trim() : "");
                    let rowTeam = idxTeam !== -1 && columns[idxTeam] ? columns[idxTeam].trim() : "First Team";
                    let rowTime = idxTime !== -1 && columns[idxTime] ? columns[idxTime].trim() : "14:30";

                    if (idxTime === -1 && rowVenue.includes('@')) {
                        const parts = rowVenue.split('@');
                        rowVenue = parts[0].trim();
                        rowTime = parts[1].trim();
                    }

                    fixturesData.push({
                        opponent: rowOpponent,
                        date: rowDate,
                        venue: rowVenue,
                        competition: rowComp,
                        team: rowTeam,
                        time: rowTime
                    });
                }
            }

            fixturesData.sort((a, b) => new Date(a.date) - new Date(b.date));

            const dropdown = document.getElementById('fixture-selector');
            dropdown.innerHTML = '<option value="">-- Select a Sorted Fixture Match --</option>';

            fixturesData.forEach((match, index) => {
                let opt = document.createElement('option');
                opt.value = index;
                opt.textContent = `(${match.date}) ${match.team} vs ${match.opponent}`;
                dropdown.appendChild(opt);
            });
        }

        function onFixtureRowChange() {
            const index = document.getElementById('fixture-selector').value;
            if (index === "") return;

            const selectedMatch = fixturesData[index];
            if (!selectedMatch) return;
            
            document.getElementById('team-input').value = selectedMatch.opponent;
            document.getElementById('venue-input').value = selectedMatch.venue;
            document.getElementById('comp-input').value = selectedMatch.competition;
            document.getElementById('squad-input').value = selectedMatch.team;
            document.getElementById('time-input').value = selectedMatch.time;
            document.getElementById('date-input').value = formatLongDateString(selectedMatch.date);

            resolveOpponentImagePipeline();
        }

        function onBackgroundFileUploaded() {
            const fileInput = document.getElementById('bg-file-uploader');
            if (fileInput.files && fileInput.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    posterBackgroundImg.src = e.target.result;
                };
                reader.readAsDataURL(fileInput.files[0]);
            }
        }

        function resolveOpponentImagePipeline() {
            const manualImageDropdown = document.getElementById('manual-opponent-logo-select');
            const currentTeamName = document.getElementById('team-input').value;
            const meta = getRepoMetadata();
            let targetFileName = manualImageDropdown.value === "AUTO" ? (currentTeamName ? `${currentTeamName}.png` : "") : manualImageDropdown.value;

            if (targetFileName) {
                const targetSrc = `https://raw.githubusercontent.com/${meta.owner}/${meta.repo}/main/Images/Club%20Images/${encodeURI(targetFileName)}`;
                if (opponentLogoImg.src !== targetSrc) {
                    opponentLogoImg.removeAttribute('src');
                    opponentLogoImg.src = targetSrc;
                }
            } else {
                opponentLogoImg.removeAttribute('src');
            }
            updateCanvasPreview();
        }

        function onManualImageChange() { resolveOpponentImagePipeline(); }
        function onManualTeamTextInput() { resolveOpponentImagePipeline(); }
        function setupColorChangeListeners() {
            document.getElementById('bg-color').addEventListener('input', updateCanvasPreview);
            document.getElementById('text-color').addEventListener('input', updateCanvasPreview);
        }

        function updateCanvasPreview() {
            const comp = document.getElementById('comp-input').value.toUpperCase();
            const squad = document.getElementById('squad-input').value.toUpperCase();
            const date = document.getElementById('date-input').value.toUpperCase();
            const team = document.getElementById('team-input').value.toUpperCase();
            const venue = document.getElementById('venue-input').value.toUpperCase();
            const time = document.getElementById('time-input').value;
            const brandingColor = document.getElementById('bg-color').value;
            const textColor = document.getElementById('text-color').value;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Layer 1: Background Layout Setup
            if (posterBackgroundImg.src && posterBackgroundImg.complete && posterBackgroundImg.naturalWidth !== 0) {
                ctx.drawImage(posterBackgroundImg, 0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "rgba(10, 15, 30, 0.85)"; 
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            } else {
                ctx.fillStyle = "#0c111d";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            // Frame Styling
            ctx.fillStyle = brandingColor;
            ctx.fillRect(0, 0, canvas.width, 24);
            ctx.fillRect(0, canvas.height - 24, canvas.width, 24);

            let gradient = ctx.createLinearGradient(0, 150, 0, canvas.height);
            gradient.addColorStop(0, "rgba(12, 17, 29, 0)");
            gradient.addColorStop(0.5, "rgba(13, 140, 34, 0.2)");
            gradient.addColorStop(1, "rgba(12, 17, 29, 0.98)");
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Layer 2: Top Header Branding Elements
            ctx.textAlign = "center";
            ctx.textBaseline = "top";
            
            ctx.fillStyle = textColor;
            ctx.font = "bold 34px system-ui, sans-serif";
            ctx.letterSpacing = "8px";
            ctx.fillText(comp || "MATCHDAY PREVIEW", canvas.width / 2, 75);

            ctx.fillStyle = brandingColor;
            ctx.font = "900 28px system-ui, sans-serif";
            ctx.letterSpacing = "6px";
            ctx.fillText(squad || "FIRST TEAM", canvas.width / 2, 125);
            ctx.letterSpacing = "0px"; 

            // Layer 3: Main Club Crest Setup
            const logoY = 250;
            const crestDimension = 260;

            try {
                ctx.drawImage(clubLogoImg, (canvas.width * 0.26) - (crestDimension/2), logoY, crestDimension, crestDimension);
            } catch(e) {
                ctx.fillStyle = textColor;
                ctx.font = "bold 28px sans-serif";
                ctx.fillText("WAUN GALAXY", canvas.width * 0.26, logoY + (crestDimension/2));
            }

            ctx.fillStyle = brandingColor;
            ctx.beginPath();
            ctx.arc(canvas.width / 2, logoY + (crestDimension/2), 55, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = "#ffffff";
            ctx.font = "italic bold 40px system-ui, sans-serif";
            ctx.textBaseline = "middle";
            ctx.fillText("VS", canvas.width / 2, logoY + (crestDimension/2));
            ctx.textBaseline = "top";

            const hasValidSrc = opponentLogoImg.getAttribute('src') !== null && opponentLogoImg.src !== "";
            if (hasValidSrc && opponentLogoImg.complete && opponentLogoImg.naturalWidth !== 0) {
                ctx.drawImage(opponentLogoImg, (canvas.width * 0.74) - (crestDimension/2), logoY, crestDimension, crestDimension);
            } else {
                ctx.fillStyle = "rgba(255, 255, 255, 0.07)";
                ctx.beginPath();
                ctx.arc(canvas.width * 0.74, logoY + (crestDimension/2), crestDimension/2, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = "#64748b";
                ctx.font = "bold 24px sans-serif";
                ctx.fillText("NO CREST", canvas.width * 0.74, logoY + (crestDimension/2) - 10);
            }

            // Layer 4: Big Bold Opponent Team Display
            const textCenterBaseY = 590;
            ctx.fillStyle = textColor;
            ctx.font = "black italic 900 92px system-ui, sans-serif";
            ctx.fillText(team || "OPPONENT CLUB", canvas.width / 2, textCenterBaseY);

            // Layer 5: Unified Match Details Panel Grouping
            const panelX = 100;
            const panelY = 740;
            const panelWidth = 800;
            const panelHeight = 180;

            ctx.fillStyle = "rgba(15, 23, 42, 0.65)";
            ctx.strokeStyle = "rgba(255, 255, 255, 0.1)";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.roundRect(panelX, panelY, panelWidth, panelHeight, 12);
            ctx.fill();
            ctx.stroke();

            // Centered Stacked Metrics inside the Details Container Box
            ctx.textAlign = "center";
            
            // Date String
            ctx.fillStyle = "#f59e0b"; // Golden core layout color highlight accent
            ctx.font = "bold 34px system-ui, sans-serif";
            ctx.fillText(date || "DATE PENDING", canvas.width / 2, panelY + 25);

            // Kick-off Time
            ctx.fillStyle = textColor;
            ctx.font = "800 32px system-ui, sans-serif";
            ctx.fillText(time ? `KICK-OFF — ${time}` : "KICK-OFF TIME PENDING", canvas.width / 2, panelY + 75);

            // Venue Location
            ctx.fillStyle = "#94a3b8";
            ctx.font = "600 28px system-ui, sans-serif";
            ctx.fillText(venue || "VENUE DATA UNSET", canvas.width / 2, panelY + 125);
        }
    </script>
</body>
</html>
